<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#fafaf8" id="themeMetaColor">
<title>rad-io</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="//fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
--bg:#fafaf8; --bg2:#f2f1ec; --bg3:#e9e7e1;
--line:#e4e2db; --line2:#ccc9c0;
--ink:#1a1915; --ink2:#6b6860; --ink3:#aba89f;
--accent:#b8935a; --accentL:#e8d8b8;
--sakura:#e8b4c0; --sakura2:#f5dde4;
--r:2px;
--serif:'Noto Serif JP',serif;
--mono:'DM Mono',monospace;
--ph:76px;
}
[data-theme="dark"] {
--bg:#121210; --bg2:#1b1a18; --bg3:#252320;
--line:#272522; --line2:#38352f;
--ink:#e6e3dc; --ink2:#8a8780; --ink3:#4e4c48;
--accent:#c8a96e; --accentL:#2a2015;
--sakura:#c47a8a; --sakura2:#2a181e;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
font-family:var(--mono);background:var(--bg);color:var(--ink);
min-height:100vh;overflow-x:hidden;
transition:background .25s,color .25s;
}
.sakura-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.petal{animation:fall linear infinite;opacity:0;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:.65}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.shell{
position:relative;z-index:1;
display:grid;
grid-template-columns:210px 1fr;
grid-template-rows:52px 1fr var(--ph);
min-height:100vh;
}
.topbar{
grid-column:1/-1;
display:flex;align-items:center;justify-content:space-between;
padding:0 24px;border-bottom:1px solid var(--line);
background:var(--bg);position:sticky;top:0;z-index:10;
}
.logo{
font-family:var(--serif);font-size:17px;font-weight:300;
letter-spacing:.14em;color:var(--ink);
display:flex;align-items:center;gap:8px;
}
.logo-accent{color:var(--accent);}
.logo-by{
font-size:9px;font-family:var(--mono);color:var(--ink3);
letter-spacing:.05em;border-left:1px solid var(--line2);padding-left:8px;
}
.logo-by a{color:var(--ink3);text-decoration:none;transition:color .15s;}
.logo-by a:hover{color:var(--accent);}
.topbar-mid{
display:flex;align-items:center;gap:7px;
font-size:11px;color:var(--ink3);letter-spacing:.07em;
}
.live-dot{
width:5px;height:5px;border-radius:50%;
background:var(--ink3);transition:background .4s;flex-shrink:0;
}
.live-dot.on{background:var(--accent);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
#statusText{max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.topbar-right{display:flex;align-items:center;gap:7px;}
.top-btn{
font-family:var(--mono);font-size:10px;letter-spacing:.09em;
color:var(--ink2);background:none;
border:1px solid var(--line2);padding:4px 11px;
cursor:pointer;transition:all .15s;border-radius:var(--r);
}
.top-btn:hover{border-color:var(--ink2);color:var(--ink);}
.theme-btn{
width:29px;height:29px;border-radius:50%;
border:1px solid var(--line2);background:none;
cursor:pointer;font-size:13px;
display:flex;align-items:center;justify-content:center;
transition:all .15s;color:var(--ink2);
}
.theme-btn:hover{border-color:var(--ink2);}
.sidebar{
border-right:1px solid var(--line);
display:flex;flex-direction:column;
overflow-y:auto;background:var(--bg);
scrollbar-width:none;
}
.sidebar::-webkit-scrollbar{display:none;}
.sb-sec{padding:18px 0 0;}
.sb-lbl{font-size:9px;letter-spacing:.18em;color:var(--ink3);padding:0 18px 8px;text-transform:uppercase;}
.mode-item{
display:flex;align-items:center;gap:9px;
padding:9px 18px;cursor:pointer;transition:background .12s;
border-left:2px solid transparent;
font-size:11.5px;letter-spacing:.03em;color:var(--ink2);
}
.mode-item:hover{background:var(--bg2);color:var(--ink);}
.mode-item.active{border-left-color:var(--accent);background:var(--bg2);color:var(--ink);}
.mode-item.active .mode-icon{color:var(--accent);}
.mode-icon{font-size:13px;width:16px;text-align:center;flex-shrink:0;}
.mode-lbl{flex:1;}
.mode-jp{font-size:9px;color:var(--ink3);font-family:var(--serif);}
.mode-cnt{font-size:9px;color:var(--ink3);}
.sb-div{height:1px;background:var(--line);margin:14px 0;}
.fav-empty{padding:8px 18px 14px;font-size:10px;color:var(--ink3);line-height:1.7;}
.fav-item{
display:flex;align-items:center;gap:7px;
padding:7px 18px;cursor:pointer;font-size:11px;color:var(--ink2);transition:background .12s;
}
.fav-item:hover{background:var(--bg2);color:var(--ink);}
.fav-n{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fav-rm{opacity:0;font-size:10px;color:var(--ink3);background:none;border:none;cursor:pointer;padding:0 2px;transition:opacity .15s;}
.fav-item:hover .fav-rm{opacity:1;}
.sb-sakura{padding:14px 18px 10px;font-size:10px;color:var(--sakura);letter-spacing:.06em;font-family:var(--serif);}
.main{overflow-y:auto;background:var(--bg);scrollbar-width:thin;scrollbar-color:var(--line2) transparent;}
.view{display:none;}
.view.active{display:block;}
.vh{
padding:22px 28px 16px;border-bottom:1px solid var(--line);
display:flex;align-items:flex-end;justify-content:space-between;
position:sticky;top:0;background:var(--bg);z-index:5;
}
.vh-title{
font-family:var(--serif);font-size:20px;font-weight:300;color:var(--ink);
display:flex;align-items:baseline;gap:8px;
}
.vh-jp{font-size:12px;color:var(--ink3);}
.vh-sub{font-size:10px;color:var(--ink3);letter-spacing:.07em;margin-top:3px;}
.vh-acts{display:flex;gap:7px;}
.sm-btn{
font-family:var(--mono);font-size:10px;letter-spacing:.07em;
color:var(--ink2);background:none;border:1px solid var(--line2);
padding:5px 10px;cursor:pointer;border-radius:var(--r);transition:all .15s;
}
.sm-btn:hover{border-color:var(--ink2);color:var(--ink);}
.sm-btn.active{border-color:var(--accent);color:var(--accent);}
.st-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
gap:1px;background:var(--line);
}
.st-card{
background:var(--bg);padding:14px 18px;cursor:pointer;
transition:background .12s;display:flex;align-items:center;gap:13px;
}
.st-card:hover{background:var(--bg2);}
.st-card.playing{background:var(--bg2);}
.st-art{
width:42px;height:42px;border-radius:var(--r);
background:var(--bg3);border:1px solid var(--line);flex-shrink:0;
display:flex;align-items:center;justify-content:center;
font-size:16px;overflow:hidden;color:var(--ink3);
}
.st-art img{width:100%;height:100%;object-fit:cover;}
.st-info{flex:1;min-width:0;}
.st-name{font-size:11.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.st-meta{font-size:10px;color:var(--ink3);display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.st-tag{font-size:9px;background:var(--bg3);border:1px solid var(--line);padding:1px 6px;border-radius:var(--r);color:var(--ink2);}
.st-acts{display:flex;gap:5px;align-items:center;opacity:0;transition:opacity .15s;flex-shrink:0;}
.st-card:hover .st-acts,.st-card.playing .st-acts{opacity:1;}
.ic-btn{
width:26px;height:26px;border-radius:var(--r);
border:1px solid var(--line2);background:var(--bg);
cursor:pointer;display:flex;align-items:center;justify-content:center;
font-size:12px;color:var(--ink2);transition:all .15s;
}
.ic-btn:hover{border-color:var(--ink);color:var(--ink);}
.ic-btn.faved{border-color:var(--accent);color:var(--accent);}
.ldg{
padding:52px 28px;display:flex;flex-direction:column;
align-items:center;gap:14px;color:var(--ink3);font-size:11px;letter-spacing:.09em;
}
.ldg-kanji{font-family:var(--serif);font-size:40px;font-weight:300;color:var(--line2);line-height:1;}
.spin{width:18px;height:18px;border:1px solid var(--line2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.disc-hd{
padding:20px 28px 16px;border-bottom:1px solid var(--line);
position:sticky;top:0;background:var(--bg);z-index:5;
}
.disc-row{display:flex;gap:7px;margin-top:14px;}
.search-in{
flex:1;font-family:var(--mono);font-size:12px;
background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);
padding:8px 13px;color:var(--ink);outline:none;transition:border .15s;letter-spacing:.04em;
}
.search-in:focus{border-color:var(--ink2);}
.search-in::placeholder{color:var(--ink3);}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;padding:12px 28px;border-bottom:1px solid var(--line);}
.tag-pill{
font-family:var(--mono);font-size:10px;letter-spacing:.05em;
padding:3px 10px;border:1px solid var(--line2);border-radius:20px;
cursor:pointer;color:var(--ink2);background:var(--bg);transition:all .15s;
}
.tag-pill:hover{border-color:var(--ink2);color:var(--ink);}
.tag-pill.active{border-color:var(--accent);color:var(--accent);background:var(--accentL);}
.tag-pill.lang{border-color:var(--sakura);color:var(--sakura);}
.tag-pill.lang.active{background:var(--sakura2);}
.q-list{padding:16px 28px;}
.q-item{
display:flex;align-items:center;gap:10px;
padding:9px 0;border-bottom:1px solid var(--line);
cursor:pointer;transition:padding-left .1s;
}
.q-item:hover{padding-left:6px;}
.q-num{font-size:10px;color:var(--ink3);width:22px;text-align:right;flex-shrink:0;}
.q-name{flex:1;font-size:11.5px;color:var(--ink2);}
.q-item.active .q-name{color:var(--ink);}
.q-item.active .q-num{color:var(--accent);}
.player-bar{
grid-column:1/-1;border-top:1px solid var(--line);background:var(--bg);
display:grid;grid-template-columns:240px 1fr 240px;
align-items:center;padding:0 22px;gap:16px;
}
.np-left{display:flex;align-items:center;gap:11px;min-width:0;}
.np-art{
width:40px;height:40px;border-radius:var(--r);
background:var(--bg3);border:1px solid var(--line);flex-shrink:0;
display:flex;align-items:center;justify-content:center;
font-size:15px;overflow:hidden;color:var(--ink3);
}
.np-art img{width:100%;height:100%;object-fit:cover;}
.np-txt{min-width:0;}
.np-name{font-size:11px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.np-mode{font-size:10px;color:var(--ink3);margin-top:2px;}
.np-ctr{display:flex;flex-direction:column;align-items:center;gap:7px;}
.ctrls{display:flex;align-items:center;gap:7px;}
.ctrl{
width:30px;height:30px;border-radius:var(--r);
background:none;border:1px solid var(--line2);
cursor:pointer;display:flex;align-items:center;justify-content:center;
font-size:12px;color:var(--ink2);transition:all .15s;
}
.ctrl:hover{border-color:var(--ink);color:var(--ink);}
.ctrl.play{width:36px;height:36px;border-color:var(--ink2);font-size:13px;}
.ctrl.play:hover{background:var(--ink);color:var(--bg);border-color:var(--ink);}
.ctrl.active{border-color:var(--accent);color:var(--accent);}
.prog-row{width:100%;display:flex;align-items:center;gap:7px;}
.p-time{font-size:9px;color:var(--ink3);min-width:28px;}
.p-time.r{text-align:right;}
.p-bar{flex:1;height:2px;background:var(--line2);cursor:pointer;position:relative;}
.p-fill{height:100%;background:var(--ink3);transition:width .5s linear;max-width:100%;}
.p-bar:hover .p-fill{background:var(--accent);}
.np-right{display:flex;align-items:center;justify-content:flex-end;gap:10px;}
.vol-row{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink3);}
input[type=range]{-webkit-appearance:none;width:78px;height:2px;background:var(--line2);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--ink2);cursor:pointer;transition:background .15s;}
input[type=range]:hover::-webkit-slider-thumb{background:var(--ink);}
.toast{
position:fixed;bottom:90px;left:50%;
transform:translateX(-50%) translateY(8px);
background:var(--ink);color:var(--bg);
font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;
padding:7px 15px;border-radius:var(--r);
opacity:0;pointer-events:none;transition:all .22s;
white-space:nowrap;z-index:99;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:680px){
.shell{grid-template-columns:1fr;grid-template-rows:52px auto 1fr 72px;}
.sidebar{
border-right:none;border-bottom:1px solid var(--line);
flex-direction:row;overflow-x:auto;overflow-y:hidden;
padding:6px 0;scrollbar-width:none;
}
.sidebar::-webkit-scrollbar{display:none;}
.sb-sec{display:flex;padding:0;flex-shrink:0;}
.sb-lbl,.sb-div,.sb-sakura{display:none;}
.sb-sec.fav-sec{display:none;}
.mode-item{
flex-direction:column;padding:5px 10px;gap:3px;
border-left:none;border-bottom:2px solid transparent;
white-space:nowrap;font-size:10px;align-items:center;
}
.mode-item.active{border-bottom-color:var(--accent);border-left:none;}
.mode-jp,.mode-cnt{display:none;}
.player-bar{grid-template-columns:1fr;padding:8px 14px;gap:6px;}
.np-right{display:none;}
.np-ctr{gap:5px;}
.vh{padding:14px 14px 10px;}
.vh-title{font-size:16px;}
.st-grid{grid-template-columns:1fr;}
.tag-row,.disc-hd{padding:10px 14px;}
.q-list{padding:10px 14px;}
#statusText{max-width:110px;}
.topbar{padding:0 12px;}
}
</style>
</head>
<body>

<div class="sakura-bg" id="sakuraBg"></div>

<div class="shell">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="logo">
      rad<span class="logo-accent">—</span>io
      <div class="logo-by">by <a href="https://github.com/hechecik" target="_blank" rel="noopener">@hechecik</a></div>
    </div>
    <div class="topbar-mid">
      <div class="live-dot" id="liveDot"></div>
      <span id="statusText">mod seç</span>
    </div>
    <div class="topbar-right">
      <button class="top-btn" onclick="switchView('stations')">istasyonlar</button>
      <button class="top-btn" onclick="switchView('discover')">keşfet</button>
      <button class="top-btn" onclick="switchView('queue')">sıra</button>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="tema (T)">☽</button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-sec" id="modeList"></div>
    <div class="sb-div"></div>
    <div class="sb-sec fav-sec">
      <div class="sb-lbl">favoriler</div>
      <div id="favList"><div class="fav-empty">henüz yok<br>♡ ile ekle</div></div>
    </div>
    <div class="sb-sakura">✿ &nbsp; sakura &nbsp; ✿</div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- STATIONS VIEW -->
    <div class="view active" id="viewStations">
      <div class="vh">
        <div>
          <div class="vh-title" id="vhTitle">mod seç <span class="vh-jp" id="vhJp"></span></div>
          <div class="vh-sub" id="vhSub">sol panelden bir mod seç</div>
        </div>
        <div class="vh-acts">
          <button class="sm-btn" id="shuffleBtn" onclick="toggleShuffle()">⇌ karıştır</button>
          <button class="sm-btn" onclick="refreshMode()">↻ yenile</button>
        </div>
      </div>
      <div id="stCon">
        <div class="ldg">
          <div class="ldg-kanji">桜</div>
          <div>bir mod seç — dinlemeye başla</div>
        </div>
      </div>
    </div>

    <!-- DISCOVER VIEW -->
    <div class="view" id="viewDiscover">
      <div class="disc-hd">
        <div class="vh-title">keşfet <span class="vh-jp">発見</span></div>
        <div class="vh-sub">40.000+ arasında keşfet</div>
        <div class="disc-row">
          <input class="search-in" id="searchIn" type="text"
            placeholder="istasyon adı veya tür..."
            onkeydown="if(event.key==='Enter')doSearch()">
          <button class="sm-btn" onclick="doSearch()">ara →</button>
          <button class="sm-btn" onclick="doRandom()">rastgele</button>
        </div>
      </div>
      <div class="tag-row" id="discTags"></div>
      <div id="discRes">
        <div class="ldg"><div>bir tür seç veya arama yap</div></div>
      </div>
    </div>

    <!-- QUEUE VIEW -->
    <div class="view" id="viewQueue">
      <div class="vh">
        <div>
          <div class="vh-title">çalma sırası <span class="vh-jp">順番</span></div>
          <div class="vh-sub" id="qSub">—</div>
        </div>
      </div>
      <div class="q-list" id="qItems"></div>
    </div>

  </main>

  <!-- PLAYER BAR -->
  <footer class="player-bar">
    <div class="np-left">
      <div class="np-art" id="npArt">♪</div>
      <div class="np-txt">
        <div class="np-name" id="npName">—</div>
        <div class="np-mode" id="npMode">dinlemeye başla</div>
      </div>
    </div>
    <div class="np-ctr">
      <div class="ctrls">
        <button class="ctrl" onclick="prevTrack()">⏮</button>
        <button class="ctrl play" id="playBtn" onclick="playPause()">▶</button>
        <button class="ctrl" onclick="nextTrack()">⏭</button>
      </div>
      <div class="prog-row">
        <span class="p-time" id="curT">—</span>
        <div class="p-bar" id="pBar" onclick="seek(event)"><div class="p-fill" id="pFill" style="width:0%"></div></div>
        <span class="p-time r" id="totT">∞</span>
      </div>
    </div>
    <div class="np-right">
      <div class="vol-row">
        <span>♩</span>
        <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.7"
          oninput="audio.volume=parseFloat(this.value)">
        <span>♪</span>
      </div>
    </div>
  </footer>

</div>
