<div class="bg-glow"></div>
<div class="toast" id="toast"></div>

<div class="container">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <span class="dot"></span>
      rad<span>-io</span>
    </div>
    <div class="now-playing">
      <strong id="npSong">bir mod seç</strong>
      <span id="npMode">dinlemeye başla 🎧</span>
    </div>
  </header>

  <!-- MODE GRID -->
  <div class="mode-grid" id="modeGrid"></div>

  <!-- NOW PLAYING BAR -->
  <div class="np-bar">
    <div class="np-visual">
      <div class="eq" id="eqBars">
        <span></span><span></span><span></span><span></span>
      </div>
    </div>
    <div class="np-info">
      <div class="np-title" id="npBarTitle">Bir mod seç</div>
      <div class="np-sub" id="npBarSub">sonsuz keşif ✦</div>
    </div>
  </div>

  <!-- PLAYER -->
  <div class="player-card">
    <div class="progress-container">
      <div class="progress-bar" id="progressBar" onclick="seek(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="time-row">
        <span id="currentTime">0:00</span>
        <span id="totalTime">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn skip" onclick="prevTrack()" title="Önceki">⏮</button>
      <button class="ctrl-btn play-btn" id="playBtn" onclick="playPause()">▶</button>
      <button class="ctrl-btn skip" onclick="nextTrack()" title="Sonraki">⏭</button>
      <button class="ctrl-btn shuffle" id="shuffleBtn" onclick="toggleShuffle()" title="Karıştır">🔀</button>
    </div>

    <div class="volume-row">
      <span class="icon">🔈</span>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.7" oninput="setVolume(this.value)">
      <span class="icon">🔊</span>
    </div>
  </div>

  <!-- BOTTOM ACTIONS -->
  <div class="bottom-actions">
    <div class="action-btn" onclick="openDiscover()">
      <span class="badge-dot"></span> Keşfet
    </div>
    <div class="action-btn" onclick="toggleQueue()">
      📋 Sıra <span id="queueCount"></span>
    </div>
    <div class="action-btn" onclick="refreshStations()">
      🔄 Tazele
    </div>
  </div>

  <!-- QUEUE (hidden by default) -->
  <div class="queue-list" id="queueList" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0 6px;border-bottom:1px solid var(--border);margin-bottom:6px">
      <span style="font-size:.75rem;font-weight:600">Sıradaki istasyonlar</span>
      <span style="font-size:.68rem;color:var(--text2);cursor:pointer" onclick="toggleQueue()">✕ kapat</span>
    </div>
    <div id="queueItems"></div>
  </div>

</div>

<!-- DISCOVER MODAL -->
<div class="modal-overlay" id="discoverModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">🔍 Keşfet</div>
    <div class="modal-sub">Yeni radyo istasyonları bul, rastgele keşfet</div>
    <div id="discoverContent">
      <div class="discover-loading">
        <div class="spinner"></div>
        <div>istasyonlar taranıyor...</div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const RADIO_API = 'https://de1.api.radio-browser.info/json';

const MODES = {
  calisma: { icon:'🧠', name:'Çalışma', desc:'derin odak', tags:['lofi','chillhop','study'] },
  surus:   { icon:'🚗', name:'Sürüş', desc:'yola çık', tags:['driving','electronic','rock'] },
  kafe:    { icon:'☕', name:'Kafe', desc:'birer kahve', tags:['jazz','cafe','bossa'] },
  kosu:    { icon:'🏃', name:'Koşu', desc:'terleyelim', tags:['running','dance','energetic'] },
  uyku:    { icon:'🌙', name:'Uyku', desc:'derin nefes', tags:['sleep','ambient','chillout'] },
  sifa:    { icon:'🧘', name:'Şifa', desc:'iyileşme', tags:['meditation','healing','newage'] },
  lofi:    { icon:'📖', name:'Lo-fi', desc:'melankolik', tags:['lofi','chillhop'] },
  sarkilar:{ icon:'🎵', name:'Şarkılar', desc:'tınılar', tags:['indie','pop','alternative'] }
};

// ===== STATE =====
let currentMode = null;
let currentIndex = 0;
let isShuffle = false;
let stations = {};      // mode -> station listesi
let currentStationList = [];
let queueOpen = false;
let queueItems = [];
let isPlaying = false;

const audio = new Audio();
audio.volume = 0.7;

// ===== RADIO BROWSER API =====
async function fetchStationsForMode(modeKey) {
  const mode = MODES[modeKey];
  const tag = mode.tags[Math.floor(Math.random() * mode.tags.length)];
  try {
    const res = await fetch(`${RADIO_API}/stations/bytag/${encodeURIComponent(tag)}?limit=15&hidebroken=true`);
    if (!res.ok) return [];
    const data = await res.json();
    return data.filter(s => s.url_resolved && s.url_resolved.startsWith('http')).slice(0, 10);
  } catch(e) {
    return [];
  }
}

async function ensureStations(modeKey) {
  if (stations[modeKey] && stations[modeKey].length >= 3) return stations[modeKey];
  const s = await fetchStationsForMode(modeKey);
  // fallback için birkaç sabit istasyon
  const fallbacks = {
    lofi:      [{name:'Nightwave Plaza',url:'https://radio.plaza.one/ogg'}],
    calisma:   [{name:'lofi radyo',url:'https://stream.laut.fm/lofi'}],
    surus:     [{name:'Truckers Radio',url:'http://streamer.radio.co/s81d30349a/low'}],
    kafe:      [{name:'Smooth Jazz',url:'https://playerservices.streamtheworld.com/api/livestream-redirect/ACIR22_s01AAC.aac'}],
    kosu:      [{name:'Positively Running',url:'https://streaming.positivity.radio/pr/running/icecast.audio'}],
    uyku:      [{name:'Ambient Sleeping Pill',url:'http://radio.stereoscenic.com/asp-h'}],
    sifa:      [{name:'Spa Lounge',url:'https://0nlineradio.radioho.st/lounge-spa-lounge?ref=radio-browser26'}],
    sarkilar:  [{name:'100hitz Indie',url:'http://206.217.213.236:8360/;stream'}]
  };
  const fallback = fallbacks[modeKey] || [];
  const merged = s.length > 0 ? s : fallback;
  stations[modeKey] = merged;
  return merged;
}

async function getShuffledStations(modeKey) {
  const list = await ensureStations(modeKey);
  const shuffled = [...list];
  for (let i = shuffled.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
}

// ===== UI BUILD =====
function buildModeGrid() {
  const grid = document.getElementById('modeGrid');
  grid.innerHTML = Object.entries(MODES).map(([key, m]) => `
    <div class="mode-card" data-mode="${key}" onclick="selectMode('${key}')">
      <div class="playing-indicator"></div>
      <div class="icon">${m.icon}</div>
      <div class="label">${m.name}</div>
      <div class="desc">${m.desc}</div>
    </div>
  `).join('');
}
buildModeGrid();

// ===== MODE SELECT =====
async function selectMode(mode) {
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
  document.querySelector(`[data-mode="${mode}"]`).classList.add('active');

  currentMode = mode;
  currentIndex = 0;

  document.getElementById('npSong').textContent = `${MODES[mode].icon} ${MODES[mode].name}`;
  document.getElementById('npMode').textContent = 'yükleniyor...';
  document.getElementById('npBarTitle').textContent = `${MODES[mode].icon} ${MODES[mode].name}`;
  document.getElementById('npBarSub').textContent = 'istasyonlar aranıyor...';

  const shuffled = await getShuffledStations(mode);
  currentStationList = shuffled;
  if (isShuffle) {
    // tekrar karıştır
    const reShuffled = [...shuffled];
    for (let i = reShuffled.length-1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i+1));
      [reShuffled[i], reShuffled[j]] = [reShuffled[j], reShuffled[i]];
    }
    currentStationList = reShuffled;
  }
  currentIndex = 0;
  updateQueue();
  loadTrack();
  play();
}

// ===== TRACK LOADING =====
function loadTrack() {
  if (!currentMode || currentStationList.length === 0) return;
  const station = currentStationList[currentIndex];
  if (!station) return;

  const name = station.name || station.station ? station.station : 'Bilinmeyen İstasyon';
  audio.src = station.url_resolved || station.url;
  document.getElementById('npBarTitle').textContent = name;
  document.getElementById('npBarSub').textContent = `${MODES[currentMode].name} • ${currentIndex+1}/${currentStationList.length}`;
  document.getElementById('npSong').textContent = name.substring(0, 30);
  document.getElementById('npMode').textContent = `${MODES[currentMode].icon} ${MODES[currentMode].name}`;

  // Media Session API
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: name,
      artist: MODES[currentMode].name,
      album: 'rad-io'
    });
    navigator.mediaSession.setActionHandler('play', () => play());
    navigator.mediaSession.setActionHandler('pause', () => pause());
    navigator.mediaSession.setActionHandler('previoustrack', () => prevTrack());
    navigator.mediaSession.setActionHandler('nexttrack', () => nextTrack());
  }

  document.title = `🎵 ${name.substring(0, 20)} — rad-io`;

  updateQueueHighlight();
}

// ===== PLAY / PAUSE =====
function play() {
  audio.play().catch(() => {});
  document.getElementById('playBtn').textContent = '⏸';
  isPlaying = true;
  document.getElementById('eqBars').style.opacity = '1';
}

function pause() {
  audio.pause();
  document.getElementById('playBtn').textContent = '▶';
  isPlaying = false;
  document.getElementById('eqBars').style.opacity = '.3';
}

function playPause() {
  if (!currentMode) { selectMode('lofi'); return; }
  if (audio.paused) { play(); } else { pause(); }
}

// ===== NAVIGATION =====
async function nextTrack() {
  if (!currentMode || currentStationList.length === 0) return;
  currentIndex = (currentIndex + 1) % currentStationList.length;
  loadTrack();
  play();
}

async function prevTrack() {
  if (!currentMode || currentStationList.length === 0) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  currentIndex = (currentIndex - 1 + currentStationList.length) % currentStationList.length;
  loadTrack();
  play();
}

// ===== SHUFFLE =====
function toggleShuffle() {
  isShuffle = !isShuffle;
  document.getElementById('shuffleBtn').classList.toggle('active');
  if (isShuffle && currentMode && currentStationList.length > 0) {
    reshuffleStations();
  }
}

async function reshuffleStations() {
  if (!currentMode) return;
  const newList = await getShuffledStations(currentMode);
  if (newList.length > 0) {
    currentStationList = newList;
    currentIndex = 0;
    loadTrack();
    play();
    updateQueue();
  }
}

// ===== REFRESH =====
async function refreshStations() {
  if (!currentMode) { showToast('önce bir mod seç'); return; }
  showToast('🔄 yeni istasyonlar taranıyor...');
  stations[currentMode] = []; // cache'i temizle
  const newList = await getShuffledStations(currentMode);
  if (newList.length > 0) {
    currentStationList = newList;
    currentIndex = 0;
    loadTrack();
    play();
    updateQueue();
    showToast(`✨ ${newList.length} yeni istasyon yüklendi`);
  } else {
    showToast('maalesef istasyon bulunamadı');
  }
}

// ===== PROGRESS =====
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => {
  document.getElementById('totalTime').textContent = formatTime(audio.duration);
});
audio.addEventListener('ended', () => { nextTrack(); });
audio.addEventListener('error', () => {
  // stream bozuksa sonraki geç
  setTimeout(() => { nextTrack(); }, 2000);
});

function seek(e) {
  const bar = document.getElementById('progressBar');
  const rect = bar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  if (audio.duration) audio.currentTime = pct * audio.duration;
}
function formatTime(s) {
  if (isNaN(s) || !isFinite(s)) return '0:00';
  if (s > 3600) {
    const h = Math.floor(s/3600);
    const m = Math.floor((s%3600)/60);
    return `${h}:${m<10?'0':''}${m}:${Math.floor(s%60)<10?'0':''}${Math.floor(s%60)}`;
  }
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}
function setVolume(v) { audio.volume = parseFloat(v); }

// ===== QUEUE =====
function toggleQueue() {
  queueOpen = !queueOpen;
  document.getElementById('queueList').style.display = queueOpen ? 'block' : 'none';
}

function updateQueue() {
  const container = document.getElementById('queueItems');
  if (!currentStationList || currentStationList.length === 0) {
    container.innerHTML = '<div style="font-size:.72rem;color:var(--text2);padding:8px 0">istasyon yok</div>';
    document.getElementById('queueCount').textContent = '';
    return;
  }
  document.getElementById('queueCount').textContent = `(${currentStationList.length})`;
  container.innerHTML = currentStationList.map((s, i) => {
    const name = s.name || s.station || 'İstasyon';
    const active = i === currentIndex ? 'active' : '';
    return `<div class="queue-item ${active}" onclick="playIndex(${i})">
      <div>
        <div class="qi-title">${i === currentIndex ? '▶ ' : ''}${name.substring(0, 35)}</div>
        <div class="qi-artist">${i+1}/${currentStationList.length}</div>
      </div>
    </div>`;
  }).join('');
}

function playIndex(i) {
  currentIndex = i;
  loadTrack();
  play();
}

function updateQueueHighlight() {
  document.querySelectorAll('.queue-item').forEach((el, i) => {
    el.classList.toggle('active', i === currentIndex);
  });
}

// Queue CSS (dynamic)
const qStyle = document.createElement('style');
qStyle.textContent = `
.queue-list {
  background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 14px;margin-top:8px;max-height:300px;overflow-y:auto;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.queue-item {
  display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;
  cursor:pointer;font-size:.75rem;transition:all .15s;color:var(--text2)
}
.queue-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.queue-item.active{background:rgba(167,139,250,.08);color:var(--g2)}
.queue-item.active::before{content:'▶';font-size:.55rem;color:var(--g2)}
.qi-title{font-weight:500;font-size:.75rem}
.qi-artist{font-size:.65rem;color:var(--text2)}
`;
document.head.appendChild(qStyle);

// ===== DISCOVER =====
async function openDiscover() {
  const modal = document.getElementById('discoverModal');
  modal.classList.add('open');
  document.getElementById('discoverContent').innerHTML = `
    <div class="discover-loading">
      <div class="spinner"></div>
      <div>istasyonlar taranıyor...</div>
    </div>
  `;

  // Random tag'lerden istasyon çek
  const allTags = ['lofi','chillhop','jazz','ambient','electronic','indie','rock','pop','classical','reggae','blues','folk','soul','rnb','hiphop','dance','techno','house','driving','study','sleep','meditation','healing','nature','instrumental','piano','guitar','world','latin','funk','disco','vaporwave','synthwave','downtempo','trip-hop','dub','minimal'];
  const randTags = [];
  for (let i = 0; i < 6; i++) {
    const t = allTags[Math.floor(Math.random() * allTags.length)];
    if (!randTags.includes(t)) randTags.push(t);
  }

  try {
    let allStations = [];
    for (const tag of randTags.slice(0, 3)) { // max 3 tag
      const res = await fetch(`${RADIO_API}/stations/bytag/${encodeURIComponent(tag)}?limit=6&hidebroken=true`);
      if (res.ok) {
        const data = await res.json();
        allStations = allStations.concat(data.filter(s => s.url_resolved).slice(0, 5));
      }
    }
    // karıştır
    for (let i = allStations.length-1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i+1));
      [allStations[i], allStations[j]] = [allStations[j], allStations[i]];
    }

    if (allStations.length === 0) {
      document.getElementById('discoverContent').innerHTML = '<div style="text-align:center;padding:24px;color:var(--text2);font-size:.8rem">😕 istasyon bulunamadı, tekrar dene</div>';
      return;
    }

    document.getElementById('discoverContent').innerHTML = `
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <div class="action-btn" onclick="reshuffleDiscover()" style="flex:1;justify-content:center">
          🔀 Rastgele
        </div>
        <div class="action-btn" onclick="closeDiscover()" style="flex:1;justify-content:center">
          ✕ Kapat
        </div>
      </div>
      <div class="discover-grid">
        ${allStations.map(s => {
          const name = (s.name || s.station || 'İstasyon').substring(0, 40);
          const tags = (s.tags || '').split(',').slice(0, 3).map(t => t.trim()).filter(t => t).join(', ');
          return `<div class="discover-item" onclick="quickPlay('${encodeURIComponent(s.url_resolved)}','${encodeURIComponent(name)}')">
            <div style="flex:1">
              <div class="discover-name">${name}</div>
              <div class="discover-meta">${tags || 'çeşitli'}</div>
            </div>
            <div class="discover-tag">▶ dinle</div>
          </div>`;
        }).join('')}
      </div>
    `;
  } catch(e) {
    document.getElementById('discoverContent').innerHTML = '<div style="text-align:center;padding:24px;color:var(--text2);font-size:.8rem">bağlantı hatası, tekrar dene</div>';
  }
}

async function reshuffleDiscover() {
  // reset the discover cache and reopen
  openDiscover();
}

function closeDiscover() {
  document.getElementById('discoverModal').classList.remove('open');
}

// Click outside to close
document.getElementById('discoverModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeDiscover();
});

function quickPlay(encodedUrl, encodedName) {
  closeDiscover();
  const url = decodeURIComponent(encodedUrl);
  const name = decodeURIComponent(encodedName);
  // Create a temporary mode
  if (!currentMode) currentMode = 'lofi';
  currentStationList = [{ name: name, url_resolved: url }];
  currentIndex = 0;
  loadTrack();
  play();
  updateQueue();
  showToast(`▶ ${name.substring(0, 25)}`);
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== KEYBOARD =====
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); playPause(); }
  if (e.code === 'ArrowRight') nextTrack();
  if (e.code === 'ArrowLeft') prevTrack();
  if (e.code === 'Escape') closeDiscover();
});

// ===== AUTO START =====
document.addEventListener('click', () => {
  if (audio.paused && currentMode) play();
}, { once: true });

// Auto-select lofi on load
setTimeout(() => { selectMode('lofi'); }, 500);

console.log('🎵 rad-io 🚀 — canlı radyo akışı aktif');
</script>
</body>
</html>
